name: Build
run-name: "${{ github.event.head_commit.message || github.ref_name }}"

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "ChangLi v__VERSION__"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles nsis

      - name: Build custom installer shell
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $setup = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) {
            throw "Inner NSIS setup exe not found"
          }
          $env:CHANGLI_NSIS_SETUP = $setup.FullName
          $env:CHANGLI_APP_VERSION = "${{ steps.version.outputs.version }}"
          cargo build --manifest-path installer-shell/Cargo.toml --release --target x86_64-pc-windows-msvc
          $customInstaller = "installer-shell/target/x86_64-pc-windows-msvc/release/changli-installer.exe"
          if (-not (Test-Path $customInstaller)) {
            throw "Custom installer shell was not built"
          }
          Get-Item $setup.FullName, $customInstaller | Select-Object FullName, Length

      - name: Prepare Windows artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = "dist-artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $customInstaller = "installer-shell/target/x86_64-pc-windows-msvc/release/changli-installer.exe"
          if (-not (Test-Path $customInstaller)) {
            throw "Custom installer shell not found"
          }
          Copy-Item -Path $customInstaller -Destination "$artifactDir/ChangLi_${{ steps.version.outputs.version }}_x64-setup.exe" -Force
          Get-ChildItem $artifactDir | Select-Object Name, Length

      - name: Replace release asset with custom installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $asset = "dist-artifacts/ChangLi_${{ steps.version.outputs.version }}_x64-setup.exe"
          if (-not (Test-Path $asset)) {
            throw "Custom release asset not found"
          }
          gh release upload "v${{ steps.version.outputs.version }}" $asset --clobber

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: ChangLi_${{ steps.version.outputs.version }}_x64-setup
          path: dist-artifacts/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Install mpv via Homebrew
        run: |
          brew install mpv
          mkdir -p src-tauri/resources/mpv
          cp $(which mpv) src-tauri/resources/mpv/mpv

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "ChangLi v__VERSION__ (macOS)"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles dmg

      - name: Upload macOS DMG to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "ChangLi_${{ steps.version.outputs.version }}_aarch64.dmg"
            gh release upload "v${{ steps.version.outputs.version }}" "ChangLi_${{ steps.version.outputs.version }}_aarch64.dmg" --clobber
          else
            echo "No DMG found, skipping release upload"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v5
        with:
          name: ChangLi_${{ steps.version.outputs.version }}_aarch64-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
