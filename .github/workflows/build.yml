name: Build
run-name: "${{ github.event.head_commit.message || github.ref_name }}"

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Bundle mpv player runtime
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-WithRetry {
            param(
              [scriptblock]$ScriptBlock,
              [string]$Description,
              [int]$MaxAttempts = 5
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                return & $ScriptBlock
              } catch {
                if ($attempt -eq $MaxAttempts) {
                  throw "$Description failed after $MaxAttempts attempts: $($_.Exception.Message)"
                }
                $delaySeconds = [Math]::Min(30, [Math]::Pow(2, $attempt))
                Write-Warning "$Description failed on attempt $attempt/${MaxAttempts}: $($_.Exception.Message). Retrying in $delaySeconds seconds..."
                Start-Sleep -Seconds $delaySeconds
              }
            }
          }

          $headers = @{
            "User-Agent" = "ChangLi-CI"
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer $env:GITHUB_TOKEN"
          }
          $release = Invoke-WithRetry -Description "Fetch latest mpv release" -ScriptBlock {
            Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          }
          $asset = $release.assets |
            Where-Object { $_.name -match '^mpv-x86_64-.*\.7z$' -and $_.name -notmatch 'debug|symbols' } |
            Select-Object -First 1
          if (-not $asset) {
            throw "No x86_64 mpv archive found in latest shinchiro/mpv-winbuild-cmake release"
          }

          $downloadDir = Join-Path $env:RUNNER_TEMP "mpv-download"
          $extractDir = Join-Path $env:RUNNER_TEMP "mpv-extract"
          New-Item -ItemType Directory -Force -Path $downloadDir, $extractDir | Out-Null
          $archive = Join-Path $downloadDir $asset.name
          Invoke-WithRetry -Description "Download $($asset.name)" -ScriptBlock {
            Invoke-WebRequest -Headers @{ "User-Agent" = "ChangLi-CI"; "Authorization" = "Bearer $env:GITHUB_TOKEN" } -Uri $asset.browser_download_url -OutFile $archive
          } | Out-Null
          7z x $archive "-o$extractDir" -y | Out-Host

          $mpvExe = Get-ChildItem $extractDir -Filter mpv.exe -Recurse | Select-Object -First 1
          if (-not $mpvExe) {
            throw "mpv.exe was not found after extracting $($asset.name)"
          }
          $mpvSource = $mpvExe.Directory.FullName
          $mpvTarget = "src-tauri\resources\mpv"
          if (Test-Path $mpvTarget) {
            Remove-Item $mpvTarget -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $mpvTarget | Out-Null
          Copy-Item -Path "$mpvSource\*" -Destination $mpvTarget -Recurse -Force
          if (-not (Test-Path "$mpvTarget\mpv.exe")) {
            throw "mpv.exe was not copied into $mpvTarget"
          }
          Get-ChildItem $mpvTarget | Select-Object Name, Length

          # Download mpv-dev package for libmpv-2.dll (not in the static mpv build)
          $devAsset = $release.assets |
            Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.7z$' -and $_.name -notmatch 'v3|debug|symbols' } |
            Select-Object -First 1
          if (-not $devAsset) {
            throw "No x86_64 mpv-dev archive found in latest shinchiro/mpv-winbuild-cmake release"
          }
          $devArchive = Join-Path $downloadDir $devAsset.name
          Invoke-WithRetry -Description "Download $($devAsset.name)" -ScriptBlock {
            Invoke-WebRequest -Headers @{ "User-Agent" = "ChangLi-CI"; "Authorization" = "Bearer $env:GITHUB_TOKEN" } -Uri $devAsset.browser_download_url -OutFile $devArchive
          } | Out-Null
          $devExtractDir = Join-Path $env:RUNNER_TEMP "mpv-dev-extract"
          New-Item -ItemType Directory -Force -Path $devExtractDir | Out-Null
          7z x $devArchive "-o$devExtractDir" -y | Out-Host

          $libDir = 'src-tauri\lib'
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null

          $libmpv2 = Get-ChildItem $devExtractDir -Filter 'libmpv-2.dll' -Recurse | Select-Object -First 1
          if ($libmpv2) {
            Copy-Item -Path $libmpv2.FullName -Destination $libDir -Force
            Write-Host "Copied libmpv-2.dll to $libDir"
          } else {
            throw "libmpv-2.dll not found in mpv-dev archive"
          }

      - name: Download libmpv-wrapper
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            "User-Agent" = "ChangLi-CI"
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer $env:GITHUB_TOKEN"
          }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/nini22P/libmpv-wrapper/releases/latest"
          $asset = $release.assets |
            Where-Object { $_.name -match 'libmpv-wrapper-windows-x86_64\.zip' } |
            Select-Object -First 1
          if (-not $asset) {
            throw "libmpv-wrapper-windows-x86_64.zip not found"
          }
          $downloadDir = Join-Path $env:RUNNER_TEMP "libmpv-wrapper"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          $archive = Join-Path $downloadDir $asset.name
          Invoke-WebRequest -Headers @{ "User-Agent" = "ChangLi-CI"; "Authorization" = "Bearer $env:GITHUB_TOKEN" } -Uri $asset.browser_download_url -OutFile $archive
          7z x $archive "-o$downloadDir" -y | Out-Host
          $libDir = 'src-tauri\lib'
          New-Item -ItemType Directory -Force -Path $libDir | Out-Null
          Copy-Item -Path "$downloadDir\bin\libmpv-wrapper.dll" -Destination $libDir -Force
          Write-Host "Copied libmpv-wrapper.dll to $libDir"
          Get-ChildItem $libDir | Select-Object Name, Length

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: changli-v${{ steps.version.outputs.version }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Generate and sign latest.json
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          EXE_PATH=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          EXE_NAME=$(basename "$EXE_PATH")
          VERSION="${{ steps.version.outputs.version }}"
          # Sign the exe file
          echo "$TAURI_SIGNING_PRIVATE_KEY" | minisign -S -s /dev/stdin -m "$EXE_PATH" -x "$EXE_PATH.sig"
          SIG=$(cat "$EXE_PATH.sig" | tail -1)
          cat > src-tauri/target/release/bundle/nsis/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "ChangLi v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/YeSuper-git/ChangLi/releases/download/v${VERSION}/${EXE_NAME}"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/latest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
