name: Build
run-name: "${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Bundle mpv player runtime
        shell: pwsh
        run: |
          choco install mpv -y --no-progress
          $mpvExe = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Filter mpv.exe -Recurse | Select-Object -First 1
          if (-not $mpvExe) {
            throw "mpv.exe was not found after Chocolatey installation"
          }
          $mpvSource = $mpvExe.Directory.FullName
          $mpvTarget = "src-tauri\resources\mpv"
          New-Item -ItemType Directory -Force -Path $mpvTarget | Out-Null
          Copy-Item -Path "$mpvSource\*" -Destination $mpvTarget -Recurse -Force
          if (-not (Test-Path "$mpvTarget\mpv.exe")) {
            throw "mpv.exe was not copied into $mpvTarget"
          }
          Get-ChildItem $mpvTarget | Select-Object Name, Length

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: changli-v${{ steps.version.outputs.version }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
