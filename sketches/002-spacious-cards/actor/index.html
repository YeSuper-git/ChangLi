<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长离 - 演员列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.6;
    }
    .actor-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #f0f0f0;
    }
    .actor-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.1);
    }
    .nav-link {
      padding: 12px 24px;
      border-radius: 8px;
      transition: all 0.2s;
      color: #6b7280;
    }
    .nav-link:hover { background: #f9fafb; color: #1a1a1a; }
    .nav-link.active { background: #f0f9ff; color: #2563eb; }
    .search-input {
      padding: 12px 20px 12px 48px;
      background: #f9fafb;
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 16px;
      width: 100%;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
    }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 20px;
    }
    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #6b7280;
    }
    .filter-btn:hover { border-color: #d1d5db; }
    .filter-btn.active { background: #111827; color: #fff; border-color: #111827; }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <h1 class="text-xl font-bold">长离</h1>
          <div class="flex gap-2">
            <a href="#" class="nav-link">首页</a>
            <a href="#" class="nav-link">搜索</a>
            <a href="#" class="nav-link">下载</a>
            <a href="#" class="nav-link active">演员</a>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200">
            <span>⚙️</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-8 py-12">
    <!-- 页面标题 -->

      <h1 class="text-3xl font-bold text-gray-900 mb-2">演员库</h1>
      <p class="text-gray-500">浏览和管理所有演员信息</p>
    </div>

    <!-- 搜索和筛选 -->

        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索演员..." class="search-input">
      </div>
      <div class="flex gap-2">
        <button class="filter-btn active">全部</button>
        <button class="filter-btn">女优</button>
        <button class="filter-btn">男优</button>
        <button class="filter-btn">已收藏</button>

  </main>
